server:
  port: 8080

spring:
  application:
    name: ai-apiword
  mail:
    host: smtp.example.com
    port: 587
    username: your-email@example.com
    password: your-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

apidoc:
  scan-package: com.example.controller
  output-dir: ./api-docs
  doc-format: markdown
  
  llm:
    api-url: https://api.openai.com/v1/chat/completions
    api-key: ${OPENAI_API_KEY:}
    model: gpt-3.5-turbo
    temperature: 0.7
    max-tokens: 2000
  
  git:
    enabled: true
    repo-path: .
    branch: main
  
  notification:
    email-enabled: false
    smtp-host: smtp.example.com
    smtp-port: 587
    username: your-email@example.com
    password: your-password
    from: api-doc@example.com
    to: dev-team@example.com

logging:
  level:
    com.apidoc: INFO
